<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Live demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --bg:#0B0B0C; --surface:#141417; --surface2:#1A1A1E; --raise:#202026;
    --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.15);
    --ink:#F0F0F2; --muted:rgba(240,240,242,0.46);
    --accent:#2563EB; --accent-ink:#fff;
    --accent-glow:rgba(37,99,235,0.40); --accent-soft:rgba(37,99,235,0.13); --accent-faint:rgba(37,99,235,0.22);
    --dot:rgba(255,255,255,.022);
    --bot-shadow:0 4px 14px rgba(0,0,0,.22);
    --shell-shadow:0 40px 90px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.02) inset;
    --head:'Bricolage Grotesque',sans-serif; --body:'DM Sans',sans-serif;
  }
  body[data-theme="light"]{
    --bg:#E7E7EA; --surface:#FFFFFF; --surface2:#F6F6F8; --raise:#F1F2F5;
    --border:rgba(0,0,0,0.07); --border2:rgba(0,0,0,0.13);
    --ink:#18181B; --muted:rgba(24,24,27,0.5);
    --dot:rgba(0,0,0,.028);
    --bot-shadow:0 4px 14px rgba(0,0,0,.06);
    --shell-shadow:0 30px 70px rgba(0,0,0,.16), 0 0 0 1px rgba(0,0,0,.02) inset;
  }

  html,body{height:100%}
  body{
    background:
      radial-gradient(120% 60% at 50% -10%, var(--accent-soft), transparent 62%),
      var(--bg);
    color:var(--ink); font-family:var(--body); line-height:1.5;
    -webkit-font-smoothing:antialiased; display:flex; align-items:center; justify-content:center;
    min-height:100dvh;
  }

  .shell{
    position:relative; width:100%; max-width:428px; height:100dvh; max-height:748px;
    background:var(--surface); border:1px solid var(--border); border-radius:22px;
    display:flex; flex-direction:column; overflow:hidden; box-shadow:var(--shell-shadow);
  }
  @media (max-width:480px){ .shell{height:100dvh;max-height:none;border-radius:0;border:none} }

  /* ambient brand glow at top */
  .shell::before{
    content:""; position:absolute; top:-42%; left:50%; transform:translateX(-50%);
    width:150%; height:60%; pointer-events:none; z-index:0;
    background:radial-gradient(50% 60% at 50% 50%, var(--accent-soft), transparent 72%);
  }

  /* header */
  .head{
    position:relative; z-index:2; display:flex; align-items:center; gap:13px;
    padding:16px 18px; border-bottom:1px solid var(--border);
    background:linear-gradient(180deg, var(--accent-soft), transparent 140%);
  }
  .avatar{
    width:42px;height:42px;border-radius:13px;flex:0 0 auto; position:relative;
    background:linear-gradient(150deg, rgba(255,255,255,.34), rgba(255,255,255,0) 55%), var(--accent);
    color:var(--accent-ink); display:flex;align-items:center;justify-content:center;
    font-family:var(--head); font-weight:700; font-size:19px;
    box-shadow:0 6px 18px var(--accent-glow), 0 0 0 1px rgba(255,255,255,.12) inset;
  }
  .head-meta{flex:1;min-width:0}
  .head-name{font-family:var(--head);font-weight:700;font-size:16px;letter-spacing:.01em;line-height:1.2;color:var(--ink)}
  .head-store{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .status{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);font-weight:500}
  .pulse{width:7px;height:7px;border-radius:50%;background:#2FBF71;box-shadow:0 0 0 0 rgba(47,191,113,.5);animation:pulse 2.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(47,191,113,.45)}70%{box-shadow:0 0 0 6px rgba(47,191,113,0)}100%{box-shadow:0 0 0 0 rgba(47,191,113,0)}}

  /* feed */
  .feed{
    position:relative; z-index:1; flex:1; overflow-y:auto; padding:22px 16px 10px;
    display:flex; flex-direction:column; gap:12px; scroll-behavior:smooth;
    background-image:radial-gradient(circle, var(--dot) 1px, transparent 1px);
    background-size:26px 26px;
  }
  .feed::-webkit-scrollbar{width:8px}
  .feed::-webkit-scrollbar-thumb{background:var(--border2);border-radius:8px}

  .row{display:flex;max-width:86%;animation:rise .34s cubic-bezier(.2,.7,.2,1)}
  .row.bot{align-self:flex-start}
  .row.user{align-self:flex-end}
  @keyframes rise{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}

  .bubble{padding:11px 15px;font-size:14.5px;word-wrap:break-word;overflow-wrap:anywhere;line-height:1.55}
  .row.bot .bubble{
    background:linear-gradient(180deg, var(--raise), var(--surface2));
    border:1px solid var(--border); color:var(--ink);
    border-radius:17px 17px 17px 6px; box-shadow:var(--bot-shadow);
  }
  .row.user .bubble{
    background:var(--accent); color:var(--accent-ink); white-space:pre-wrap;
    border-radius:17px 17px 6px 17px; box-shadow:0 5px 16px var(--accent-glow);
  }
  /* markdown inside bot bubbles */
  .bubble p{margin:0 0 8px}
  .bubble p:last-child{margin-bottom:0}
  .bubble ul,.bubble ol{margin:6px 0 8px;padding-left:20px}
  .bubble ul:last-child,.bubble ol:last-child{margin-bottom:0}
  .bubble li{margin:4px 0;padding-left:2px}
  .row.bot .bubble li::marker{color:var(--accent);font-weight:700}
  .bubble strong{font-weight:600}
  .bubble em{font-style:italic}
  .bubble a{color:var(--accent);text-decoration:underline;text-underline-offset:2px}
  .row.bot .bubble p+p{margin-top:0}

  .typing{display:flex;gap:5px;padding:4px 2px}
  .typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.18s}.typing span:nth-child(3){animation-delay:.36s}
  @keyframes blink{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}

  /* starter chips (greeting) */
  .faqbar{display:flex;flex-direction:column;gap:7px;padding:12px 14px 6px;position:relative;z-index:2}
  .faqbar:empty{display:none}
  .faqlabel{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;font-family:var(--head);margin:0 2px 3px;animation:rise .4s backwards}
  .faqbar .chip{
    width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:13px 16px;border-radius:13px;text-align:left;line-height:1.35;
    border:1px solid var(--border2);
    background:linear-gradient(180deg, var(--accent-soft), transparent 220%);
    color:var(--ink);font-size:13.5px;font-family:var(--body);cursor:pointer;
    transition:border-color .18s, background .18s, transform .12s, box-shadow .18s;
    animation:rise .4s cubic-bezier(.2,.7,.2,1) backwards;
  }
  .faqbar .chip::after{content:"→";color:var(--muted);font-size:15px;flex:0 0 auto;transition:transform .2s, color .18s}
  .faqbar .chip:hover{border-color:var(--accent);background:var(--accent-soft);box-shadow:0 8px 22px rgba(0,0,0,.10)}
  .faqbar .chip:hover::after{color:var(--accent);transform:translateX(4px)}
  .faqbar .chip:active{transform:scale(.99)}

  /* cap banner */
  .cap{
    margin:2px 2px 0;padding:14px 16px;border-radius:14px;
    background:var(--accent-soft);border:1px solid var(--accent-faint);
    font-size:13.5px;color:var(--ink);display:none;text-align:center;line-height:1.5;
  }
  .cap.show{display:block;animation:rise .34s cubic-bezier(.2,.7,.2,1)}

  /* compose */
  .compose{position:relative;z-index:2;display:flex;gap:9px;padding:13px 14px calc(13px + env(safe-area-inset-bottom));border-top:1px solid var(--border);background:linear-gradient(0deg, var(--accent-soft), transparent 200%)}
  .compose input{
    flex:1;background:var(--bg);border:1px solid var(--border2);color:var(--ink);
    border-radius:13px;padding:13px 15px;font-family:var(--body);font-size:14.5px;outline:none;
    transition:border-color .18s, box-shadow .18s;
  }
  .compose input::placeholder{color:var(--muted)}
  .compose input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-faint)}
  .compose input:disabled{opacity:.5}
  .send{
    flex:0 0 auto;border:none;cursor:pointer;border-radius:13px;width:48px;height:48px;
    display:flex;align-items:center;justify-content:center;
    background:var(--accent);color:var(--accent-ink);
    box-shadow:0 5px 16px var(--accent-glow);transition:filter .15s, transform .12s;
  }
  .send svg{display:block}
  .send:hover{filter:brightness(1.08)}
  .send:active{transform:scale(.96)}
  .send:disabled{opacity:.4;cursor:default;box-shadow:none}

  .by{text-align:center;font-size:11px;color:var(--muted);padding:9px;border-top:1px solid var(--border);background:var(--surface2);position:relative;z-index:2}
  .by a{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--border2)}
  .by a:hover{color:var(--ink)}

  @media (prefers-reduced-motion:reduce){
    .row,.chip,.cap,.faqlabel{animation:none}
    .pulse{animation:none}
    .feed{scroll-behavior:auto}
  }
</style>
</head>
<body>
  <div class="shell">
    <div class="head">
      <div class="avatar" id="avatar">A</div>
      <div class="head-meta">
        <div class="head-name" id="botName">Assistant</div>
        <div class="head-store" id="storeName">Store</div>
      </div>
      <div class="status"><span class="pulse"></span> Online</div>
    </div>

    <div class="feed" id="feed"></div>

    <div style="padding:0 16px 8px;position:relative;z-index:2">
      <div class="cap" id="cap"></div>
    </div>

    <div class="faqbar" id="faqbar"></div>

    <div class="compose">
      <input id="input" type="text" placeholder="Ask a question…" autocomplete="off" />
      <button class="send" id="send" aria-label="Send"><svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22 11 13 2 9 22 2Z"/></svg></button>
    </div>

    <div class="by">⚡ Built by <a href="https://morlan.dev" target="_blank" rel="noopener">Morlan</a></div>
  </div>

<script>
  // ---------- elements ----------
  const feed = document.getElementById('feed');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const cap = document.getElementById('cap');
  const faqbar = document.getElementById('faqbar');

  // works both live (relative) and when the file is opened locally for testing
  const API = (location.protocol === 'file:') ? 'https://morlan.dev/api/chat' : '/api/chat';

  const MSG_CAP = 15;
  let userCount = 0;
  let busy = false;
  let lastUserRow = null;
  const history = [];   // API messages only — must start with a user turn
  let cfg = null;

  // ---------- helpers ----------
  function decodeConfig(b64){
    const bin = atob(b64);
    const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
    return JSON.parse(new TextDecoder().decode(bytes));
  }
  function hexToParts(hex){
    const m = /^#?([0-9a-f]{6})$/i.exec((hex||'').trim());
    if(!m) return [37,99,235];
    const n = parseInt(m[1],16);
    return [(n>>16)&255,(n>>8)&255,n&255];
  }

  // ---------- tiny safe markdown (escape first, then only our own tags) ----------
  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function inlineMd(s){
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(^|[^*])\*(?!\s)([^*]+?)\*(?!\*)/g, '$1<em>$2</em>');
    s = s.replace(/(^|[^\w`])_([^_]+)_(?=$|[^\w])/g, '$1<em>$2</em>');
    s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    return s;
  }
  function renderMarkdown(raw){
    const lines = esc(raw).split('\n');
    let html = '', i = 0;
    const bullet = l => /^\s*[-*•]\s+/.test(l);
    const numbered = l => /^\s*\d+[.)]\s+/.test(l);
    while(i < lines.length){
      const line = lines[i];
      if(bullet(line)){
        html += '<ul>';
        while(i < lines.length && bullet(lines[i])){ html += '<li>'+inlineMd(lines[i].replace(/^\s*[-*•]\s+/,''))+'</li>'; i++; }
        html += '</ul>'; continue;
      }
      if(numbered(line)){
        html += '<ol>';
        while(i < lines.length && numbered(lines[i])){ html += '<li>'+inlineMd(lines[i].replace(/^\s*\d+[.)]\s+/,''))+'</li>'; i++; }
        html += '</ol>'; continue;
      }
      if(/^\s*$/.test(line)){ i++; continue; }
      const para = [];
      while(i < lines.length && !/^\s*$/.test(lines[i]) && !bullet(lines[i]) && !numbered(lines[i])){
        para.push(inlineMd(lines[i])); i++;
      }
      html += '<p>'+para.join('<br>')+'</p>';
    }
    return html || '<p></p>';
  }

  function addBubble(who, text){
    const row = document.createElement('div');
    row.className = 'row ' + who;
    const b = document.createElement('div');
    b.className = 'bubble';
    if(who === 'bot') b.innerHTML = renderMarkdown(text);
    else b.textContent = text;
    row.appendChild(b);
    feed.appendChild(row);
    return row;
  }
  // pin a row near the top of the feed so the reply reads top-to-bottom
  function anchorTop(row){
    if(!row) return;
    feed.scrollTo({ top: Math.max(0, row.offsetTop - 14), behavior:'smooth' });
  }
  function showTyping(){
    const row = document.createElement('div');
    row.className = 'row bot'; row.id = 'typing';
    row.innerHTML = '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    feed.appendChild(row);
  }
  function hideTyping(){ const t=document.getElementById('typing'); if(t) t.remove(); }

  function renderChips(items){
    if(!items || !items.length || !faqbar) return;
    faqbar.innerHTML = '';
    const label = document.createElement('div');
    label.className = 'faqlabel'; label.textContent = 'Suggested';
    label.style.animationDelay = '.05s';
    faqbar.appendChild(label);
    items.slice(0,3).forEach((q,i) => {
      const chip = document.createElement('button');
      chip.className = 'chip'; chip.textContent = q;
      chip.style.animationDelay = (0.07*i + 0.12) + 's';
      chip.addEventListener('click', () => { if(busy) return; input.value = q; send(); });
      faqbar.appendChild(chip);
    });
  }

  function lockForCap(){
    input.disabled = true; sendBtn.disabled = true;
    input.placeholder = 'Demo limit reached';
    if(faqbar) faqbar.style.display = 'none';
    cap.classList.add('show');
    cap.innerHTML = "That's the demo — but the real thing never clocks off. Want this live on " +
      (cfg && cfg.store ? cfg.store : 'your store') + "? Reply to my DM and I'll set it up.";
  }

  async function send(){
    if(busy || !cfg) return;
    const text = input.value.trim();
    if(!text) return;

    if(faqbar) faqbar.innerHTML = '';   // suggested questions clear after first ask
    lastUserRow = addBubble('user', text);
    history.push({ role:'user', content:text });
    input.value = '';
    userCount++;
    busy = true; sendBtn.disabled = true;
    showTyping();
    anchorTop(lastUserRow);             // pin the question to the top

    try{
      const r = await fetch(API, {
        method:'POST',
        headers:{'content-type':'application/json'},
        body: JSON.stringify({ messages: history, brand:{ store:cfg.store, bot:cfg.bot, knowledge:cfg.knowledge }})
      });
      const data = await r.json();
      hideTyping();
      const reply = data.reply || "Sorry — something glitched. Try that again?";
      addBubble('bot', reply);
      history.push({ role:'assistant', content: reply });
    }catch(e){
      hideTyping();
      addBubble('bot', "Connection hiccup — give that another go?");
    }

    anchorTop(lastUserRow);             // keep the question at the top; reply flows beneath
    busy = false;
    if(userCount >= MSG_CAP){ lockForCap(); }
    else { sendBtn.disabled = false; input.focus(); }
  }

  // ---------- listeners ----------
  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', e => { if(e.key === 'Enter') send(); });

  // ---------- decode config + theme + paint ----------
  try { cfg = decodeConfig(location.hash.slice(1)); } catch(e){ cfg = null; }

  if(!cfg){
    addBubble('bot', "This demo link is missing its setup — generate a fresh one from the builder.");
    input.disabled = true; sendBtn.disabled = true;
  } else {
    const mode = (cfg.mode === 'light') ? 'light' : 'dark';
    document.body.setAttribute('data-theme', mode);

    const accent = cfg.accent || '#2563EB';
    const [r,g,b] = hexToParts(accent);
    const root = document.documentElement.style;
    const glowA = (mode === 'light') ? 0.26 : 0.40;
    root.setProperty('--accent', accent);
    root.setProperty('--accent-glow', `rgba(${r},${g},${b},${glowA})`);
    root.setProperty('--accent-soft', `rgba(${r},${g},${b},0.13)`);
    root.setProperty('--accent-faint', `rgba(${r},${g},${b},0.22)`);

    // optional per-brand palette overrides for a fully bespoke feel
    if(cfg.palette && typeof cfg.palette === 'object'){
      const map = {bg:'--bg',surface:'--surface',surface2:'--surface2',raise:'--raise',ink:'--ink',muted:'--muted',border:'--border',border2:'--border2',accentInk:'--accent-ink'};
      for(const k in map){ if(cfg.palette[k]) root.setProperty(map[k], cfg.palette[k]); }
    }

    document.getElementById('botName').textContent = cfg.bot || 'Assistant';
    document.getElementById('storeName').textContent = cfg.store || '';
    document.getElementById('avatar').textContent = (cfg.bot || 'A').trim().charAt(0).toUpperCase();
    document.title = (cfg.bot || 'Demo') + ' — ' + (cfg.store || 'Live demo');

    addBubble('bot', cfg.greeting || ("Hi, I'm " + (cfg.bot||'your assistant') + ". What are you shopping for today?"));
    renderChips(cfg.suggestions);
    input.focus();
  }
</script>
</body>
</html>
