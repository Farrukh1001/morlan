<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Live demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0C0C0C; --surface:#141414; --surface2:#1B1B1B;
    --border:rgba(255,255,255,0.09); --border2:rgba(255,255,255,0.16);
    --white:#EFEFEF; --muted:rgba(239,239,239,0.45);
    --accent:#2563EB; --accent-ink:#ffffff;
    --head:'Bricolage Grotesque',sans-serif; --body:'DM Sans',sans-serif;
  }
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--white); font-family:var(--body);
    line-height:1.5; -webkit-font-smoothing:antialiased;
    display:flex; align-items:center; justify-content:center;
    padding:0; min-height:100dvh;
  }
  .shell{
    width:100%; max-width:440px; height:100dvh; max-height:760px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; display:flex; flex-direction:column; overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,0.5);
  }
  @media (max-width:480px){ .shell{height:100dvh;max-height:none;border-radius:0;border-left:none;border-right:none} }

  /* header */
  .head{
    display:flex; align-items:center; gap:12px;
    padding:16px 18px; border-bottom:1px solid var(--border);
    background:var(--surface2);
  }
  .avatar{
    width:40px;height:40px;border-radius:50%;flex:0 0 auto;
    background:var(--accent); color:var(--accent-ink);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--head); font-weight:700; font-size:18px;
  }
  .head-meta{flex:1;min-width:0}
  .head-name{font-family:var(--head);font-weight:700;font-size:16px;letter-spacing:.01em}
  .head-store{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .dot{width:7px;height:7px;border-radius:50%;background:#3ECf8E;box-shadow:0 0 0 3px rgba(62,207,142,.18)}

  /* messages */
  .feed{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:12px}
  .row{display:flex;max-width:84%}
  .row.bot{align-self:flex-start}
  .row.user{align-self:flex-end}
  .bubble{
    padding:11px 14px;border-radius:14px;font-size:14.5px;white-space:pre-wrap;word-wrap:break-word;
  }
  .row.bot .bubble{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:5px;color:var(--white)}
  .row.user .bubble{background:var(--accent);color:var(--accent-ink);border-bottom-right-radius:5px}

  .typing{display:flex;gap:4px;padding:13px 15px}
  .typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:b 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.18s}.typing span:nth-child(3){animation-delay:.36s}
  @keyframes b{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}

  /* cap banner */
  .cap{
    margin:4px 2px 0; padding:13px 15px; border-radius:12px;
    background:rgba(37,99,235,.10); border:1px solid var(--border2);
    font-size:13.5px; color:var(--white); display:none; text-align:center; line-height:1.5;
  }
  .cap.show{display:block}

  /* input */
  .compose{
    display:flex;gap:9px;padding:12px 14px;border-top:1px solid var(--border);
    background:var(--surface2);
  }
  .compose input{
    flex:1;background:var(--bg);border:1px solid var(--border);color:var(--white);
    border-radius:11px;padding:12px 14px;font-family:var(--body);font-size:14.5px;outline:none;
  }
  .compose input:focus{border-color:var(--border2)}
  .compose input:disabled{opacity:.5}
  .send{
    flex:0 0 auto;border:none;cursor:pointer;border-radius:11px;padding:0 18px;
    background:var(--accent);color:var(--accent-ink);font-family:var(--head);font-weight:700;font-size:14px;
    transition:opacity .15s;
  }
  .send:hover{opacity:.88}
  .send:disabled{opacity:.4;cursor:default}

  .by{
    text-align:center;font-size:11px;color:var(--muted);padding:9px;border-top:1px solid var(--border);background:var(--surface2);
  }
  .by a{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--border2)}
  .by a:hover{color:var(--white)}
</style>
</head>
<body>
  <div class="shell">
    <div class="head">
      <div class="avatar" id="avatar">A</div>
      <div class="head-meta">
        <div class="head-name" id="botName">Assistant</div>
        <div class="head-store" id="storeName">Store</div>
      </div>
      <div class="status"><span class="dot"></span> Online</div>
    </div>

    <div class="feed" id="feed"></div>

    <div style="padding:0 16px 8px">
      <div class="cap" id="cap"></div>
    </div>

    <div class="compose">
      <input id="input" type="text" placeholder="Ask a question…" autocomplete="off" />
      <button class="send" id="send">Send</button>
    </div>

    <div class="by">⚡ Built by <a href="https://morlan.dev" target="_blank" rel="noopener">Morlan</a></div>
  </div>

<script>
  // ---------- decode brand config from URL hash ----------
  function decodeConfig(b64){
    const bin = atob(b64);
    const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
    return JSON.parse(new TextDecoder().decode(bytes));
  }

  const MSG_CAP = 15;
  let userCount = 0;
  let busy = false;
  const history = [];           // API messages only (starts with a user turn)

  let cfg = null;
  try { cfg = decodeConfig(location.hash.slice(1)); } catch(e){ cfg = null; }

  if(!cfg){
    document.getElementById('feed').innerHTML =
      '<div class="row bot"><div class="bubble">This demo link is missing its setup. Generate a fresh one from the builder.</div></div>';
    document.getElementById('input').disabled = true;
    document.getElementById('send').disabled = true;
  } else {
    const accent = cfg.accent || '#2563EB';
    document.documentElement.style.setProperty('--accent', accent);
    document.getElementById('botName').textContent = cfg.bot || 'Assistant';
    document.getElementById('storeName').textContent = cfg.store || '';
    document.getElementById('avatar').textContent = (cfg.bot || 'A').trim().charAt(0).toUpperCase();
    document.title = (cfg.bot || 'Demo') + ' — ' + (cfg.store || 'Live demo');

    const greeting = cfg.greeting ||
      ("Hi, I'm " + (cfg.bot||'your assistant') + ". What are you shopping for today?");
    addBubble('bot', greeting);
  }

  const feed = document.getElementById('feed');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const cap = document.getElementById('cap');

  function addBubble(who, text){
    const row = document.createElement('div');
    row.className = 'row ' + who;
    const b = document.createElement('div');
    b.className = 'bubble';
    b.textContent = text;
    row.appendChild(b);
    feed.appendChild(row);
    feed.scrollTop = feed.scrollHeight;
    return row;
  }

  function showTyping(){
    const row = document.createElement('div');
    row.className = 'row bot';
    row.id = 'typing';
    row.innerHTML = '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    feed.appendChild(row);
    feed.scrollTop = feed.scrollHeight;
  }
  function hideTyping(){ const t=document.getElementById('typing'); if(t) t.remove(); }

  function lockForCap(){
    input.disabled = true; sendBtn.disabled = true;
    input.placeholder = 'Demo limit reached';
    cap.classList.add('show');
    cap.innerHTML = "That's the end of the demo — but the real thing never stops. Want this live on " +
      (cfg.store || 'your store') + "? Reply to my DM and I'll set it up.";
  }

  async function send(){
    if(busy || !cfg) return;
    const text = input.value.trim();
    if(!text) return;

    addBubble('user', text);
    history.push({ role:'user', content:text });
    input.value = '';
    userCount++;
    busy = true; sendBtn.disabled = true;
    showTyping();

    try{
      const r = await fetch('/api/chat', {
        method:'POST',
        headers:{'content-type':'application/json'},
        body: JSON.stringify({ messages: history, brand: {
          store: cfg.store, bot: cfg.bot, knowledge: cfg.knowledge
        }})
      });
      const data = await r.json();
      hideTyping();
      const reply = data.reply || "Sorry — something glitched. Try again?";
      addBubble('bot', reply);
      history.push({ role:'assistant', content: reply });
    }catch(e){
      hideTyping();
      addBubble('bot', "Connection hiccup — give that another go?");
    }

    busy = false;
    if(userCount >= MSG_CAP){ lockForCap(); }
    else { sendBtn.disabled = false; input.focus(); }
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', e => { if(e.key === 'Enter') send(); });
  input.focus();
</script>
</body>
</html>
